name: Build Linux Container APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        cache: true

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Build Bionic Tools
      run: |
        # Download Termux package index
        curl -sL "https://packages.termux.org/apt/termux-main/dists/stable/main/binary-aarch64/Packages.gz" -o /tmp/Packages.gz
        gunzip -c /tmp/Packages.gz > /tmp/Packages
        mkdir -p /tmp/bionic-build

        # Function to download and extract a deb
        for pkg in bash nano openssh libandroid-support libcrypt openssl zlib ca-certificates; do
          echo "=== $pkg ==="
          filename=$(grep -A 30 "^Package: $pkg\$" /tmp/Packages | grep "^Filename:" | awk '{print $2}')
          if [ -z "$filename" ]; then
            echo "  -> no encontrado"
            continue
          fi
          url="https://packages.termux.org/apt/termux-main/$filename"
          debname=$(basename "$filename")
          curl -sL -o "/tmp/$debname" "$url" || { echo "  -> download fail"; continue; }
          dpkg-deb -x "/tmp/$debname" /tmp/bionic-build/ 2>/dev/null && echo "  -> OK" || echo "  -> dpkg-deb fail"
        done

        # Create tarball
        cd /tmp/bionic-build
        tar -czf $GITHUB_WORKSPACE/bionic-tools.tar.gz \
          --exclude='share/doc' --exclude='share/man' --exclude='share/info' \
          --exclude='share/locale' --exclude='include' --exclude='var' --exclude='tmp' \
          bin/ lib/ libexec/ etc/ 2>/dev/null || true

        echo "=== Tarball ==="
        ls -lh $GITHUB_WORKSPACE/bionic-tools.tar.gz
        tar -tzf $GITHUB_WORKSPACE/bionic-tools.tar.gz | head -20

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: linux-container-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload Bionic Tools
      uses: actions/upload-artifact@v4
      with:
        name: bionic-tools
        path: bionic-tools.tar.gz

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/app/outputs/flutter-apk/app-release.apk
          bionic-tools.tar.gz
        generate_release_notes: true
