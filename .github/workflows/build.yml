name: Build Linux Container APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        cache: true

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Build Bionic Tools
      run: |
        # Descargar Packages.gz
        curl -sL "https://packages.termux.org/apt/termux-main/dists/stable/main/binary-aarch64/Packages.gz" -o /tmp/Packages.gz
        
        # Extraer paquetes
        rm -rf /tmp/bionic_build && mkdir -p /tmp/bionic_build
        
        for p in bash nano openssh libandroid-support libcrypt openssl zlib ca-certificates; do
          python3 scripts/extract-bionic.py "$p" /tmp/bionic_build /tmp/Packages.gz
        done
        
        echo "=== Archivos extraidos ==="
        find /tmp/bionic_build -type f -name "*.so*" -o -type f -executable 2>/dev/null | head -20
        
        # Crear tarball desde el prefijo Termux
        cd /tmp/bionic_build
        PREFIX="data/data/com.termux/files/usr"
        if [ -d "$PREFIX" ]; then
          cd "$PREFIX"
          echo "Usando prefijo Termux"
        fi
        pwd
        ls -la bin/ 2>/dev/null || echo "No bin/"
        
        tar -czf $GITHUB_WORKSPACE/bionic-tools.tar.gz \
          --exclude='share/doc' --exclude='share/man' --exclude='share/info' \
          --exclude='share/locale' --exclude='include' --exclude='var' \
          bin/ lib/ libexec/ etc/ share/ 2>/dev/null || true
        
        echo "=== Tarball ==="
        ls -lh $GITHUB_WORKSPACE/bionic-tools.tar.gz
        tar -tzf $GITHUB_WORKSPACE/bionic-tools.tar.gz | head -30

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: linux-container-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload Bionic Tools
      uses: actions/upload-artifact@v4
      with:
        name: bionic-tools
        path: bionic-tools.tar.gz

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/app/outputs/flutter-apk/app-release.apk
          bionic-tools.tar.gz
        generate_release_notes: true
